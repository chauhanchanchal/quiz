{% extends "base.html" %}

{% block content %}

<div id="loginPage" class="page active">
  <div class="login-card">

    <div class="logo">
      <div class="logo-icon">🎯</div>
      <span class="logo-text">Quiz Generator</span>
    </div>

    <p class="login-subtitle">Welcome back! Please login</p>

    {% if error %}
    <p style="color: var(--red); margin-bottom: 15px;">{{ error }}</p>
    {% endif %}

    <form method="POST">

      <div class="form-group">
        <label class="form-label">KU ID</label>
        <input name="ku_id" class="form-input" placeholder="Enter your KU ID" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-input" placeholder="Enter your password" required>
      </div>

      <button class="btn btn-primary">Login</button>

    </form>
    <br>
    <p class="register-link">
      <span style="color: var(--text-secondary);">Don't have an account?</span><br>
      <a href="/register" style="color: var(--accent);">Register</a>
    </p>

  </div>
</div>

{% endblock %}
